<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Сүндет-той</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    min-height: 100%;
    background: #fff;
    overflow-x: hidden;
  }

  .wrap {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    display: block;
  }

  .wrap img {
    width: 100%;
    height: auto;
    display: block;
  }

  .music-btn {
    position: absolute;
    top: 5.7%;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 60px;
    z-index: 5;
    background: transparent;
    border: none;
    cursor: pointer;
  }

  .map-btn {
    position: absolute;
    bottom: 19%;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 70px;
    z-index: 5;
  }
</style>
</head>

<body>

  <div class="wrap">
    <img src="iPhone.png" alt="">

    <!-- музыка -->
    <audio id="music" src="music.mp3" preload="auto" loop></audio>

    <!-- кнопка музыки -->
    <button class="music-btn" id="musicBtn"></button>

    <!-- карта -->
    <a class="map-btn"
       href="https://2gis.kz/shymkent/firm/70000001054205583"
       target="_blank">
    </a>
  </div>

<script>
  const music = document.getElementById('music');
  const musicBtn = document.getElementById('musicBtn');

  let isPlaying = false;

  function playMusic() {
    music.play();
    isPlaying = true;
  }

  function pauseMusic() {
    music.pause();
    isPlaying = false;
  }

  // 🎵 первый клик по экрану запускает музыку
  document.body.addEventListener('click', () => {
    if (!isPlaying) {
      playMusic();
    }
  }, { once: true });

  // 🎵 кнопка play/pause
  musicBtn.addEventListener('click', function (e) {
    e.stopPropagation();

    if (music.paused) {
      playMusic();
    } else {
      pauseMusic();
    }
  });
</script>

</body>
</html>
